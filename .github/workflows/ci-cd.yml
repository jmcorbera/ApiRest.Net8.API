name: CI/CD

on:
  push:
    branches:
      - development

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/apirest-net8-api:development

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: src/ApiRest.Net8.API/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Update GitOps repo (dev)
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/jmcorbera/GitOps.git

      - name: Update image in kustomization (dev)
        run: |
          cd GitOps/apps/apiRest.Net8.API/overlays/dev
          kustomize edit set image juanmcorbera/apirest-net8-api=${{ env.IMAGE_NAME }}

      - name: Commit and push changes
        run: |
          cd GitOps/apps/apiRest.Net8.API/overlays/dev
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update dev image"
            git push
          fi
